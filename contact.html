<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vidhi Patel - Contact</title>
  <meta name="description" content="Get in touch with Vidhi Patel - contact form and social media links.">
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="header-placeholder"></div>

  <main>
    <section class="contact-form">
      <h1>Contact Me</h1>
      <p>Have a question or just want to say hi? Fill out the form below.</p>

      <!-- no JS validation yet, that's Phase 2 -->
      <form id="contact-form">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email">
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="general">General</option>
            <option value="project">Project Inquiry</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5"></textarea>
        </div>

        <button type="submit" class="btn-download">Send Message</button>
      </form>
    </section>

    <section class="social-links">
      <h2>Find Me Online</h2>
      <ul class="social-list">
        <li><a href="#">🔗 LinkedIn</a></li>
        <li><a href="#">💻 GitHub</a></li>
        <li><a href="#">📷 Instagram</a></li>
      </ul>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/theme.js"></script>
  <script src="js/components.js"></script>
  <script src="js/validate.js"></script>

</body>
</html>
